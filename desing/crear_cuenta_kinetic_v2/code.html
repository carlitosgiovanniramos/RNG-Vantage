<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: #f5f7f5;
        }
        .brutalist-shadow {
            box-shadow: 12px 12px 0px 0px rgba(44, 47, 46, 0.1);
        }
    </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Hero Background Element (Asymmetric Editorial Detail) -->
<div class="fixed top-0 right-0 w-1/3 h-full bg-primary-container opacity-10 -z-10 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-64 h-64 bg-primary opacity-5 -z-10 blur-[100px] pointer-events-none"></div>
<!-- Main Registration Section -->
<main class="flex-grow flex items-center justify-center p-6 md:p-12">
<div class="w-full max-w-[540px]">
<!-- Branding Header -->
<div class="mb-12 text-center md:text-left">
<div class="inline-block mb-4">
<span class="font-headline text-4xl font-black tracking-tighter text-on-surface uppercase block leading-none">
                        RNG-Vantage
                    </span>
<div class="h-2 w-full bg-primary mt-1"></div>
</div>
<h1 class="font-headline text-5xl md:text-6xl font-extrabold tracking-tighter text-on-surface uppercase leading-[0.9] mt-6">
                    Crear Cuenta
                </h1>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest p-8 md:p-12 brutalist-shadow border-0 relative">
<!-- Decorative Kinetic Element -->
<div class="absolute -top-4 -right-4 bg-primary text-on-primary font-headline font-bold px-4 py-2 text-xs tracking-widest uppercase rotate-3">
                    Join The Pulse
                </div>
<form class="space-y-8">
<!-- Input: Name -->
<div class="group relative">
<label class="font-headline text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-2 block">
                            Nombre Completo
                        </label>
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 text-lg font-body placeholder:text-outline transition-all duration-300" placeholder="John Doe" type="text"/>
</div>
<!-- Input: Email -->
<div class="group relative">
<label class="font-headline text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-2 block">
                            Correo Electrónico
                        </label>
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 text-lg font-body placeholder:text-outline transition-all duration-300" placeholder="hola@rngvantage.com" type="email"/>
</div>
<!-- Input: Password Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="group relative">
<label class="font-headline text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-2 block">
                                Contraseña
                            </label>
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 text-lg font-body placeholder:text-outline transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
<div class="group relative">
<label class="font-headline text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-2 block">
                                Confirmar Password
                            </label>
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 text-lg font-body placeholder:text-outline transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- LOPDP Checkbox -->
<div class="flex items-start space-x-4 mt-4">
<div class="flex items-center h-6">
<input class="h-5 w-5 rounded-none border-2 border-on-surface text-primary focus:ring-primary transition-all cursor-pointer" id="lopdp" name="lopdp" type="checkbox"/>
</div>
<div class="text-sm">
<label class="font-body text-on-surface-variant leading-tight block" for="lopdp">
                                Acepto la <span class="text-primary font-semibold underline decoration-2 underline-offset-4">Política de Privacidad</span> y el tratamiento de mis datos según la LOPDP.
                            </label>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary font-headline font-black text-xl uppercase tracking-tighter py-6 transition-all duration-200 hover:bg-primary-dim active:scale-[0.98] flex items-center justify-center group" type="submit">
<span>Empezar Ahora</span>
<span class="material-symbols-outlined ml-3 group-hover:translate-x-2 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-10 text-center">
<a class="font-headline text-xs font-bold uppercase tracking-widest text-on-surface hover:text-primary transition-colors border-b-2 border-transparent hover:border-primary pb-1" href="/login">
                        ¿Ya tienes cuenta? Inicia sesión
                    </a>
</div>
</div>
<!-- Asymmetric Editorial Quote -->
<div class="mt-12 opacity-30 select-none">
<span class="font-headline text-8xl font-black block leading-[0.5] tracking-tighter italic">VANTAGE</span>
</div>
</div>
</main>
<!-- Footer Component (Shared) -->
<footer class="w-full mt-20 flex flex-col md:flex-row justify-between items-center p-12 bg-[#2c2f2e] dark:bg-[#000000]">
<div class="h-[8px] w-full bg-[#ae2900] absolute left-0 bottom-full"></div>
<div class="mb-8 md:mb-0">
<span class="text-lg font-black text-white font-headline tracking-tighter uppercase">RNG-VANTAGE</span>
</div>
<div class="flex flex-wrap justify-center gap-8">
<a class="font-['Space_Grotesk'] text-xs font-light tracking-widest uppercase text-[#f5f7f5] opacity-60 hover:opacity-100 hover:text-[#ff7855] transition-all duration-300" href="#">Privacy Policy</a>
<a class="font-['Space_Grotesk'] text-xs font-light tracking-widest uppercase text-[#f5f7f5] opacity-60 hover:opacity-100 hover:text-[#ff7855] transition-all duration-300" href="#">Terms of Service</a>
<a class="font-['Space_Grotesk'] text-xs font-light tracking-widest uppercase text-[#f5f7f5] opacity-60 hover:opacity-100 hover:text-[#ff7855] transition-all duration-300" href="#">Legal Notice</a>
</div>
<div class="mt-8 md:mt-0">
<p class="font-['Space_Grotesk'] text-xs font-light tracking-widest uppercase text-[#f5f7f5] opacity-40">
                © 2024 RNG-VANTAGE. ALL RIGHTS RESERVED.
            </p>
</div>
</footer>
